<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Codiac || Microcontroller Programming </title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/blockly/blockly.min.js"></script> 
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="menu-row">
        <div class="menu-left" aria-label="Main">
          <div class="menu-item">
            <button id="fileMenuBtn" class="menu-link menu-trigger" type="button">File</button>
            <div id="fileMenu" class="menu-dropdown" role="menu" aria-label="File">
                <button id="newWorkspaceBtn" class="menu-action" type="button" role="menuitem">New</button>
                <button id="openXmlBtn" class="menu-action" type="button" role="menuitem">Open</button>
                <button id="saveCBtn" class="menu-action" type="button" role="menuitem">Save As</button>
            </div>
          </div>
          <input id="openXmlInput" type="file" accept=".xml" hidden />
          <div class="menu-item">
            <button id="editMenuBtn" class="menu-link menu-trigger" type="button">Edit</button>
            <div id="editMenu" class="menu-dropdown" role="menu" aria-label="Edit">
              <button id="undoBtn" class="menu-action" type="button" role="menuitem">
                <span>Undo</span>
                <span class="menu-shortcut">Ctrl+Z</span>
              </button>
              <button id="redoBtn" class="menu-action" type="button" role="menuitem">
                <span>Redo</span>
                <span class="menu-shortcut">Ctrl+Y</span>
              </button>
              <button id="sampleBtn" class="menu-action" type="button" role="menuitem">
                <span>Sample</span>
              </button>
            </div>
          </div>
          <button id="helpBtn" class="menu-link" type="button">Help</button>
        </div>
      </div>
      <div class="tool-row">
        <div class="tool-left">
          <button class="tool-btn tool-btn-primary" type="button" title="Verify">
            <svg viewBox="0 0 16 16" aria-hidden="true" focusable="false">
              <path d="M6.2 11.6 2.7 8.1l1.2-1.2 2.3 2.3 5-5 1.2 1.2-6.2 6.2z" />
            </svg>
          </button>
          <button class="tool-btn" type="button" title="Upload">
            <svg viewBox="0 0 16 16" aria-hidden="true" focusable="false">
              <path d="M8 2.5 12 6.5h-2.5V12h-3V6.5H4L8 2.5z" />
            </svg>
          </button>
          <button class="tool-btn" type="button" title="Debug">
            <svg viewBox="0 0 16 16" aria-hidden="true" focusable="false">
              <path d="M8 3a5 5 0 1 0 0 10 5 5 0 0 0 0-10zm0 2.2a2.8 2.8 0 1 1 0 5.6 2.8 2.8 0 0 1 0-5.6z" />
            </svg>
          </button>
        </div>
        <div class="tool-right">
          <button class="tool-icon" type="button" title="Monitor">
            <svg viewBox="0 0 16 16" aria-hidden="true" focusable="false">
              <path d="M2 3h12v10H2zM4 6h4v2H4z" />
            </svg>
          </button>
          <button class="tool-icon" type="button" title="Plotter">
            <svg viewBox="0 0 16 16" aria-hidden="true" focusable="false">
              <path d="M2 12h12v1H2zM3 10l3-3 2 2 4-5 1 1-5 6-2-2-3 3z" />
            </svg>
          </button>
        </div>
      </div>
    </header>

    <!-- Calculator Circle Button -->
    <button id="calcCircleBtn" class="calc-button" title="Open Calculator">🧮</button>

    <main class="studio">
      <section class="editor-pane">
        <div class="editor-tabs">
        </div>
        <div class="workspace-wrap">
          <div id="toolboxSplitter" class="toolbox-splitter" aria-hidden="true"></div>
          <div id="blocklyDiv"></div>
        </div>
      </section>

      <aside class="right-pane">
        <article class="card output-wrap">
          <div class="panel-head">Generated C Code</div>
          <div class="actions">
            <button id="generateBtn" class="btn-primary">Generate C Code</button>
            <button id="downloadBtn" class="btn-icon" type="button" title="Download C">
              <svg viewBox="0 0 16 16" aria-hidden="true" focusable="false">
                <path d="M8 2v6.1l2.2-2.2 1.1 1.1L8 10.2 4.7 7l1.1-1.1L8 8.1V2h0zM3 12h10v2H3v-2z" />
              </svg>
            </button>
            <button id="copyBtn" class="btn-secondary" type="button">Copy Code</button>
          </div>
          <pre id="output">Click "Generate C Code" to see output.</pre>
        </article>
      </aside>
    </main>
  </div>

  <!-- Calculator Modal -->
  <div id="calcModal" class="modal-overlay">
    <div class="modal-container">
      <div class="modal-header">
        <div class="modal-title">Hexadecimal Calculator</div>
        <button id="calcModalClose" class="modal-close">✕</button>
      </div>
      <div class="modal-body">
        <div class="calc-grid">
          <div class="field">
            <label for="hexA">Value A</label>
            <input id="hexA" type="text" value="0x0C" placeholder="0x0C" />
          </div>
          <div class="field">
            <label for="hexB">Value B</label>
            <input id="hexB" type="text" value="0x30" placeholder="0x30" />
          </div>
        </div>
        
        <!-- Shared Number Pad -->
        <div class="numberpad">
          <button type="button" class="numpad-btn" data-value="1">1</button>
          <button type="button" class="numpad-btn" data-value="2">2</button>
          <button type="button" class="numpad-btn" data-value="3">3</button>
          <button type="button" class="numpad-btn del" data-action="backspace">DEL</button>
          <button type="button" class="numpad-btn" data-value="4">4</button>
          <button type="button" class="numpad-btn" data-value="5">5</button>
          <button type="button" class="numpad-btn" data-value="6">6</button>
          <button type="button" class="numpad-btn" data-value="7">7</button>
          <button type="button" class="numpad-btn" data-value="8">8</button>
          <button type="button" class="numpad-btn" data-value="9">9</button>
          <button type="button" class="numpad-btn" data-value="0">0</button>
          <button type="button" class="numpad-btn" data-value="A">A</button>
          <button type="button" class="numpad-btn" data-value="B">B</button>
          <button type="button" class="numpad-btn" data-value="C">C</button>
          <button type="button" class="numpad-btn" data-value="D">D</button>
          <button type="button" class="numpad-btn" data-value="E">E</button>
          <button type="button" class="numpad-btn" data-value="F">F</button>
          <button type="button" class="numpad-btn clear wide" data-action="clear">CLEAR</button>
        </div>
        
        <div class="field">
          <label for="hexOp">Operation</label>
          <select id="hexOp">
            <option value="OR">OR (|)</option>
            <option value="AND">AND (&)</option>
          </select>
        </div>
        <button id="calcBtn" class="btn-primary">Calculate</button>
        <pre id="calcResult" class="calc-result">Result: 0x3C</pre>
      </div>
    </div>
  </div>

  <!-- Help Modal -->
  <div id="helpModal" class="modal-overlay">
    <div id="helpModalContainer" class="modal-container help-modal">
      <div class="modal-header">
        <div class="modal-title">Microprocessor Programming IDE</div>
        <button id="helpModalClose" class="modal-close">✕</button>
      </div>
      <div class="modal-body help-body">
        <div class="help-line"><strong>Microprocessor Programming IDE</strong></div>
        <div class="help-line">Version: 1.1.1</div>
        <div class="help-line">Copyright @codiac</div>
      </div>
      <div class="modal-footer">
        <button id="helpOkBtn" class="btn-secondary" type="button">OK</button>
        <button id="helpCopyBtn" class="btn-primary" type="button">Copy</button>
      </div>
    </div>
  </div>

  <xml id="toolbox" style="display: none">
    <block type="start_block"></block>
    <block type="include_library"></block>
    <block type="initialize_8052"></block>
    <block type="assign_register_hex"></block>
    <block type="assign_bit_value"></block>
    <block type="while_forever"></block>
    <block type="print_text"></block>
    <block type="text_input"></block>
  </xml>

<script src="blocks.js"></script>
</body>
</html>
